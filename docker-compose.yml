services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "5173"
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - pgbouncer
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dom_cafe}
      POSTGRES_USER: ${POSTGRES_USER:-dom_cafe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: ${POSTGRES_USER:-dom_cafe_user}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      DATABASES_DBNAME: ${POSTGRES_DB:-dom_cafe}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_AUTH_TYPE: plain
    expose:
      - "6432"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:11080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
