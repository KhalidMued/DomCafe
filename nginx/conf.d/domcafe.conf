limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=order_create:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Cloudflare Tunnel traffic arrives from the Docker host/network as a
    # single source IP; restore the real client IP from CF-Connecting-IP so
    # limit_req and the backend rate limits key on the actual visitor.
    # Direct LAN/Tailscale clients are outside 172.16.0.0/12, so they cannot
    # spoof the header.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header CF-Connecting-IP;

    include /etc/nginx/conf.d/security-headers.inc;
    limit_req_status 429;

    location = /api/admin/login {
        limit_req zone=admin_login burst=4 nodelay;
        proxy_pass http://backend:8000/api/admin/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-store" always;
    }

    location = /api/admin/login/ {
        limit_req zone=admin_login burst=4 nodelay;
        proxy_pass http://backend:8000/api/admin/login/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-store" always;
    }

    location = /api/orders {
        limit_req zone=order_create burst=9 nodelay;
        proxy_pass http://backend:8000/api/orders;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-store" always;
    }

    location = /api/orders/ {
        limit_req zone=order_create burst=9 nodelay;
        proxy_pass http://backend:8000/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-store" always;
    }

    location /uploads/ {
        alias /app/uploads/;
        try_files $uri =404;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
